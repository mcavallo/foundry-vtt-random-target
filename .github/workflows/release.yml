name: Release

on:
  push:
    branches:
      - master

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  versioning:
    name: Versioning
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
      release_type: ${{ steps.bump.outputs.release_type }}
      changelog: ${{ steps.bump.outputs.changelog }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump and tag new version
        id: bump
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          default_bump: false

  release:
    if: |
      needs.versioning.outputs.new_tag &&
      !startsWith(needs.versioning.outputs.release_type, 'pre')
    name: Release
    runs-on: ubuntu-latest
    needs:
      - versioning
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

      - name: Create .env
        run: echo "GH_API_TOKEN=${{ secrets.GH_API_TOKEN }}" > .env

      - name: Build
        id: build
        run: |
          RELEASE_VERSION=${{ needs.versioning.outputs.new_tag }} just build
          echo "module_id=$(jq -r '.foundryModule.id' package.json)" >> $GITHUB_OUTPUT

      - name: Create zip
        id: zip
        run: |
          zip_file="${{ steps.build.outputs.module_id }}_${{ needs.versioning.outputs.new_tag }}.zip"
          cd dist/ && zip -r "../$zip_file" *
          echo "name=$zip_file" >> $GITHUB_OUTPUT

      - name: Create Github release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          token: ${{ secrets.GH_TOKEN }}
          tag: ${{ needs.versioning.outputs.new_tag }}
          artifacts: "./dist/module.json,${{ steps.zip.outputs.name }}"
          body: ${{ needs.versioning.outputs.changelog }}

      - name: Push release to Foundry
        uses: mcavallo/foundry-vtt-release@v1
        with:
          foundry-release-token: ${{ secrets.FOUNDRY_RELEASE_TOKEN }}
          manifest-path: dist/module.json
